<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>ClauseAI</title>
	
	<!-- Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		
		html, body, #root {
			width: 100%;
			height: 100%;
			overflow: auto;
		}
		
		body {
			-webkit-font-smoothing: antialiased;
			-moz-osx-font-smoothing: grayscale;
			background-color: #F5F2ED;
		}
		
		/* Smooth page transitions */
		#root > div {
			animation: fadeIn 0.2s ease-out;
		}
		
		@keyframes fadeIn {
			from { opacity: 0; transform: translateY(8px); }
			to { opacity: 1; transform: translateY(0); }
		}
		
		/* Custom scrollbar */
		::-webkit-scrollbar {
			width: 10px;
		}
		
		::-webkit-scrollbar-track {
			background: transparent;
		}
		
		::-webkit-scrollbar-thumb {
			background: rgba(197, 164, 126, 0.4);
			border-radius: 5px;
		}
		
		::-webkit-scrollbar-thumb:hover {
			background: rgba(197, 164, 126, 0.6);
		}
		
		/* Smooth scrolling */
		* {
			scroll-behavior: smooth;
		}
	</style>
</head>
<body>
	<div id="root"></div>
	<script type="module" src="/src/main.jsx"></script>
</body>
</html>
